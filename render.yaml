services:
  - type: web
    name: volvero-api
    env: node
    rootDir: apps/api
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false # Set this securely in the Render dashboard
      - key: SUPABASE_URL
        sync: false # Set this securely in the Render dashboard
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false # Set this securely in the Render dashboard
